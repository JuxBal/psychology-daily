<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PsychDaily · 心理学日报</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#FAF8F5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <style>
    :root {
      --bg: #FAF8F5;
      --card-bg: #FFFFFF;
      --text: #2C2416;
      --text-secondary: #5C5548;
      --text-muted: #8A8276;
      --china: #B5343E;
      --world: #1A5276;
      --shadow: 0 2px 8px rgba(0,0,0,0.04);
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .app {
      width: 100%;
      max-width: 480px;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* 头部 */
    .header {
      background: white;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-date { font-weight: 600; font-size: 1.1rem; }
    .header-date small { display: block; font-weight: 400; color: var(--text-muted); font-size: 0.7rem; }
    .header-stats { display: flex; gap: 10px; }
    .stat { font-size: 0.7rem; padding: 4px 10px; border-radius: 12px; font-weight: 600; }
    .stat-cn { background: #FEF0EF; color: var(--china); }
    .stat-wd { background: #EEF5FA; color: var(--world); }
    /* 切换Tab */
    .tabs {
      display: flex;
      padding: 12px 20px 0;
      gap: 12px;
      background: var(--bg);
      position: sticky;
      top: 60px;
      z-index: 9;
    }
    .tab {
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.8rem;
      background: white;
      border: 1px solid #E8E4DC;
      cursor: pointer;
      transition: 0.2s;
    }
    .tab.active {
      background: var(--china);
      color: white;
      border-color: var(--china);
    }
    .tab.world-tab.active {
      background: var(--world);
      border-color: var(--world);
    }
    /* 新闻列表 */
    .news-list {
      flex: 1;
      padding: 12px 16px 30px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      padding: 14px;
      gap: 14px;
      transition: 0.2s;
      border-left: 4px solid transparent;
    }
    .card.china-card { border-left-color: var(--china); }
    .card.world-card { border-left-color: var(--world); }
    .card-img {
      width: 80px; height: 80px;
      border-radius: 12px;
      background: #f0eeea;
      flex-shrink: 0;
      overflow: hidden;
      object-fit: cover;
    }
    .card-content { flex: 1; min-width: 0; }
    .card-title { font-weight: 600; font-size: 0.9rem; line-height: 1.4; margin-bottom: 4px; }
    .card-summary { font-size: 0.72rem; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-meta { margin-top: 6px; display: flex; gap: 8px; align-items: center; }
    .tag { font-size: 0.6rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .tag-cn { background: #FEF0EF; color: var(--china); }
    .tag-wd { background: #EEF5FA; color: var(--world); }
    .tag-important { background: #FFF7E6; color: #B86E1A; }
    .source { font-size: 0.6rem; color: var(--text-muted); }
    /* 底部导航 */
    .nav {
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid #eee;
      position: sticky;
      bottom: 0;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      font-size: 0.6rem; color: var(--text-muted); cursor: pointer;
    }
    .nav-item.active { color: var(--text); font-weight: 600; }
    .nav-icon { font-size: 1.3rem; }
    /* 加载状态 */
    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .empty { text-align: center; padding: 40px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="app">
    <!-- 头部 -->
    <div class="header">
      <div class="header-date">
        <span id="dateDisplay"></span>
        <small id="weekdayDisplay"></small>
      </div>
      <div class="header-stats">
        <span class="stat stat-cn" id="cnCount">🇨🇳 0条</span>
        <span class="stat stat-wd" id="wdCount">🌏 0条</span>
      </div>
    </div>
    <!-- Tab 切换 -->
    <div class="tabs">
      <div class="tab active" id="tabAll" onclick="switchTab('all')">全部</div>
      <div class="tab" id="tabCN" onclick="switchTab('china')">🇨🇳 中国</div>
      <div class="tab world-tab" id="tabWD" onclick="switchTab('world')">🌏 世界</div>
    </div>
    <!-- 新闻列表 -->
    <div class="news-list" id="newsList">
      <div class="loading">📰 正在加载今日心理学日报…</div>
    </div>
    <!-- 底部导航 -->
    <div class="nav">
      <div class="nav-item active"><span class="nav-icon">📰</span>日报</div>
      <div class="nav-item"><span class="nav-icon">🔍</span>发现</div>
      <div class="nav-item"><span class="nav-icon">📅</span>活动</div>
      <div class="nav-item"><span class="nav-icon">👤</span>我的</div>
    </div>
  </div>

  <script>
    // 日期显示
    function updateDateDisplay() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2,'0');
      const d = String(now.getDate()).padStart(2,'0');
      const weekdays = ['日','一','二','三','四','五','六'];
      document.getElementById('dateDisplay').textContent = `${y}年${m}月${d}日`;
      document.getElementById('weekdayDisplay').textContent = `星期${weekdays[now.getDay()]}`;
    }
    updateDateDisplay();

    let allNews = [];
    let currentTab = 'all';

    // 加载 news.json
    async function loadNews() {
      try {
        const response = await fetch('news.json?' + Date.now()); // 避免缓存
        const data = await response.json();
        allNews = data.news || [];
        renderNews();
      } catch (e) {
        document.getElementById('newsList').innerHTML = '<div class="empty">⚠️ 日报加载失败，请检查网络或稍后重试</div>';
        console.error(e);
      }
    }

    function renderNews() {
      const list = document.getElementById('newsList');
      if (!allNews.length) {
        list.innerHTML = '<div class="empty">📭 今日暂无心理学新闻</div>';
        updateCounts();
        return;
      }

      const filtered = currentTab === 'china' 
        ? allNews.filter(n => n.region === 'china')
        : currentTab === 'world' 
          ? allNews.filter(n => n.region === 'world')
          : allNews;

      if (!filtered.length) {
        list.innerHTML = '<div class="empty">📭 该分区暂无新闻</div>';
        updateCounts(filtered.length, currentTab !== 'all' ? currentTab : 'all');
        return;
      }

      list.innerHTML = filtered.map(news => `
        <div class="card ${news.region === 'china' ? 'china-card' : 'world-card'}">
          <img class="card-img" src="${news.image || 'https://placehold.co/160x160/f0eeea/8a8276?text=Psych%F0%9F%A7%A0'}" alt="新闻配图" onerror="this.onerror=null;this.src='https://placehold.co/160x160/f0eeea/8a8276?text=🧠';">
          <div class="card-content">
            <div class="card-title">${news.title}</div>
            <div class="card-summary">${news.summary}</div>
            <div class="card-meta">
              <span class="tag ${news.region === 'china' ? 'tag-cn' : 'tag-wd'}">${news.region === 'china' ? '中国' : '世界'}</span>
              ${news.important ? '<span class="tag tag-important">重磅</span>' : ''}
              <span class="source">${news.source}</span>
            </div>
          </div>
        </div>
      `).join('');

      updateCounts();
    }

    function updateCounts() {
      const cnCount = allNews.filter(n => n.region === 'china').length;
      const wdCount = allNews.filter(n => n.region === 'world').length;
      document.getElementById('cnCount').textContent = `🇨🇳 ${cnCount}条`;
      document.getElementById('wdCount').textContent = `🌏 ${wdCount}条`;
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabAll').classList.remove('active');
      document.getElementById('tabCN').classList.remove('active');
      document.getElementById('tabWD').classList.remove('active');
      if (tab === 'all') document.getElementById('tabAll').classList.add('active');
      else if (tab === 'china') document.getElementById('tabCN').classList.add('active');
      else if (tab === 'world') document.getElementById('tabWD').classList.add('active');
      renderNews();
    }

    // 启动加载
    loadNews();
  </script>
</body>
</html>
