<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PsychDaily · 心理学日报</title>
  <style>
    :root {
      --bg: #FAF8F5;
      --card-bg: #FFFFFF;
      --text: #2C2416;
      --text-secondary: #5C5548;
      --text-muted: #8A8276;
      --china: #B5343E;
      --world: #1A5276;
      --shadow: 0 2px 10px rgba(0,0,0,0.04);
      --radius: 16px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .app {
      width: 100%;
      max-width: 700px; /* 适当放宽，减少留白 */
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    /* 头部 */
    .header {
      background: white;
      padding: 16px 20px 12px;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header-date { font-weight: 600; font-size: 1.1rem; }
    .header-date small { display: block; font-weight: 400; color: var(--text-muted); font-size: 0.7rem; }
    .header-stats { display: flex; gap: 8px; }
    .stat { font-size: 0.65rem; padding: 4px 10px; border-radius: 12px; font-weight: 600; }
    .stat-cn { background: #FEF0EF; color: var(--china); }
    .stat-wd { background: #EEF5FA; color: var(--world); }
    /* 切换Tab */
    .tabs {
      display: flex;
      padding: 12px 20px 0;
      gap: 10px;
      background: var(--bg);
      position: sticky;
      top: 60px;
      z-index: 9;
      overflow-x: auto;
    }
    .tab {
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.8rem;
      background: white;
      border: 1px solid #E8E4DC;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }
    .tab.active {
      background: var(--china);
      color: white;
      border-color: var(--china);
    }
    .tab.world-tab.active {
      background: var(--world);
      border-color: var(--world);
    }
    /* 新闻卡片区域 */
    .news-grid {
      flex: 1;
      padding: 12px 16px 30px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 600px) {
      .news-grid {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
    }
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border-top: 4px solid var(--china);
    }
    .card.world-card {
      border-top-color: var(--world);
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }
    .card-img {
      width: 100%;
      height: 140px;
      background: #f0eeea;
      object-fit: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      position: relative;
    }
    .card-body {
      padding: 14px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-title {
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1.4;
      margin-bottom: 6px;
    }
    .card-summary {
      font-size: 0.78rem;
      color: var(--text-secondary);
      line-height: 1.5;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      margin-top: 10px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 0.6rem;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: 600;
    }
    .tag-cn { background: #FEF0EF; color: var(--china); }
    .tag-wd { background: #EEF5FA; color: var(--world); }
    .tag-important { background: #FFF7E6; color: #B86E1A; }
    .source {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-left: auto;
    }
    /* 详情弹窗 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; visibility: hidden; opacity: 0; transition: 0.2s;
    }
    .modal-overlay.open { visibility: visible; opacity: 1; }
    .modal {
      background: white; border-radius: 20px; padding: 20px;
      max-width: 90vw; max-height: 80vh; width: 500px; overflow-y: auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .modal img { width: 100%; border-radius: 12px; margin-bottom: 12px; }
    .modal h2 { font-size: 1.2rem; margin-bottom: 8px; }
    .modal p { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
    .modal a { color: var(--world); text-decoration: underline; }
    .close-btn {
      float: right; background: none; border: none; font-size: 1.5rem;
      cursor: pointer; line-height: 1;
    }
    /* 底部导航 */
    .nav {
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 calc(16px + env(safe-area-inset-bottom));
      border-top: 1px solid #eee;
      position: sticky;
      bottom: 0;
      z-index: 10;
    }
    .nav-item {
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      font-size: 0.6rem; color: var(--text-muted); cursor: pointer;
      transition: 0.2s;
    }
    .nav-item.active { color: var(--text); font-weight: 600; }
    .nav-icon { font-size: 1.3rem; }
  </style>
</head>
<body>
  <div class="app">
    <!-- 头部 -->
    <div class="header">
      <div class="header-date">
        <span id="dateDisplay"></span>
        <small id="weekdayDisplay"></small>
      </div>
      <div class="header-stats">
        <span class="stat stat-cn" id="cnCount">🇨🇳 0条</span>
        <span class="stat stat-wd" id="wdCount">🌏 0条</span>
      </div>
    </div>
    <!-- 顶部筛选Tab -->
    <div class="tabs">
      <div class="tab active" data-tab="all">全部</div>
      <div class="tab" data-tab="china">🇨🇳 中国</div>
      <div class="tab world-tab" data-tab="world">🌏 世界</div>
    </div>
    <!-- 新闻卡片网格 -->
    <div class="news-grid" id="newsGrid"></div>
    <!-- 底部导航（可点击切换Tab） -->
    <div class="nav">
      <div class="nav-item active" data-nav="all"><span class="nav-icon">📰</span>全部</div>
      <div class="nav-item" data-nav="china"><span class="nav-icon">🇨🇳</span>中国</div>
      <div class="nav-item" data-nav="world"><span class="nav-icon">🌏</span>世界</div>
      <div class="nav-item" data-nav="about"><span class="nav-icon">ℹ️</span>关于</div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <script>
    // ========== 工具函数 ==========
    function updateDateDisplay() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2,'0');
      const d = String(now.getDate()).padStart(2,'0');
      const weekdays = ['日','一','二','三','四','五','六'];
      document.getElementById('dateDisplay').textContent = `${y}年${m}月${d}日`;
      document.getElementById('weekdayDisplay').textContent = `星期${weekdays[now.getDay()]}`;
    }
    updateDateDisplay();

    // 生成占位图（背景色+心理学emoji）
    function placeholderImage(region) {
      const colors = region === 'china' ? ['#FCE4E3','#F9DEDC','#F5D0D0'] : ['#DCE9F3','#C5D9EA','#B0C9DE'];
      const emojis = ['🧠','📖','🔬','💡','📊','🧩'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      const emoji = emojis[Math.floor(Math.random() * emojis.length)];
      return `<div style="background:${color};width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;">${emoji}</div>`;
    }

    // ========== 数据加载与渲染 ==========
    let allNews = [];
    let currentTab = 'all';

    async function loadNews() {
      try {
        const response = await fetch('news.json?' + Date.now());
        const data = await response.json();
        allNews = data.news || [];
        renderNews();
      } catch (e) {
        document.getElementById('newsGrid').innerHTML = '<p style="text-align:center;padding:40px;">⚠️ 日报加载失败，请检查网络</p>';
        console.error(e);
      }
    }

    function renderNews() {
      const grid = document.getElementById('newsGrid');
      if (!allNews.length) {
        grid.innerHTML = '<p style="text-align:center;padding:40px;">📭 今日暂无心理学新闻</p>';
        updateCounts();
        return;
      }
      const filtered = currentTab === 'china' ? allNews.filter(n => n.region === 'china')
                     : currentTab === 'world' ? allNews.filter(n => n.region === 'world')
                     : allNews;
      if (!filtered.length) {
        grid.innerHTML = '<p style="text-align:center;padding:40px;">📭 该分类暂无新闻</p>';
        updateCounts();
        return;
      }
      grid.innerHTML = filtered.map((news, index) => `
        <div class="card ${news.region === 'world' ? 'world-card' : ''}" onclick="openDetail('${index}')">
          <div class="card-img">${news.image ? `<img src="${news.image}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML=placeholderImage('${news.region}');">` : placeholderImage(news.region)}</div>
          <div class="card-body">
            <div class="card-title">${news.title}</div>
            <div class="card-summary">${news.summary || '暂无摘要'}</div>
            <div class="card-meta">
              <span class="tag ${news.region === 'china' ? 'tag-cn' : 'tag-wd'}">${news.region === 'china' ? '中国' : '世界'}</span>
              ${news.important ? '<span class="tag tag-important">重磅</span>' : ''}
              <span class="source">${news.source || ''}</span>
            </div>
          </div>
        </div>
      `).join('');
      updateCounts();
    }

    function updateCounts() {
      const cnCount = allNews.filter(n => n.region === 'china').length;
      const wdCount = allNews.filter(n => n.region === 'world').length;
      document.getElementById('cnCount').textContent = `🇨🇳 ${cnCount}条`;
      document.getElementById('wdCount').textContent = `🌏 ${wdCount}条`;
    }

    // ========== Tab 切换逻辑（顶部和底部联动） ==========
    function setActiveTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab[data-tab="${tab}"]`)?.classList.add('active');
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector(`.nav-item[data-nav="${tab}"]`)?.classList.add('active');
      renderNews();
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => setActiveTab(tab.dataset.tab));
    });
    document.querySelectorAll('.nav-item').forEach(nav => {
      nav.addEventListener('click', () => {
        const navTab = nav.dataset.nav;
        if (navTab === 'about') {
          alert('🧠 心理学日报 · 每日更新\n数据来源为公开学术新闻，仅供参考。');
          return;
        }
        setActiveTab(navTab);
      });
    });

    // ========== 卡片点击弹出详情 ==========
    const modalOverlay = document.getElementById('modalOverlay');
    const modalContent = document.getElementById('modalContent');
    function openDetail(index) {
      const filtered = currentTab === 'china' ? allNews.filter(n => n.region === 'china')
                     : currentTab === 'world' ? allNews.filter(n => n.region === 'world')
                     : allNews;
      const news = filtered[index];
      if (!news) return;
      modalContent.innerHTML = `
        <button class="close-btn" onclick="closeModal()">✕</button>
        ${news.image ? `<img src="${news.image}" onerror="this.style.display='none';">` : ''}
        <h2>${news.title}</h2>
        <p>${news.summary || '暂无详细摘要'}</p>
        <div style="font-size:0.8rem;color:var(--text-muted);margin-top:8px;">
          ${news.source ? `<strong>来源：</strong>${news.source}<br>` : ''}
          ${news.link ? `<a href="${news.link}" target="_blank">🔗 查看原文</a>` : ''}
        </div>
      `;
      modalOverlay.classList.add('open');
    }
    function closeModal() {
      modalOverlay.classList.remove('open');
    }
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // 启动
    loadNews();
  </script>
</body>
</html>
